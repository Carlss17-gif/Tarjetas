<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarjeta Premium</title>

<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>

<body>

<div class="wallet">

  <div class="card" id="card">

    <div class="inner" id="inner">

      <!-- FRENTE -->
      <div class="face front">

        <div class="stars"></div>

        <div class="content">
          <div class="top">
            <img src="logo.png" class="logo">
            <span class="emboss">PREMIUM</span>
          </div>

          <div class="number emboss" id="cardNumber"></div>
          </div>
        </div>

      </div>

      <!-- ATRÁS -->
      <div class="face back">

        <div class="back-content">

          <!-- PROMO -->
          <div class="promo" id="promoText">
            Promoción activa
          </div>

          <!-- QR -->
          <div class="qr-box">
            <canvas id="qr"></canvas>
          </div>

          <!-- LOGO CARLS JR -->
          <div class="brand-back">
            <img src="logo.png">
          </div>

          <!-- VIGENCIA -->
          <div class="legal">
            VIGENCIA AL 31 DE DICIEMBRE DE 2026. NO VÁLIDO CON OTRAS PROMOCIONES.
          </div>

        </div>

      </div>

    </div>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
