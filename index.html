<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarjeta Premium</title>

<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>

<body>

<div class="wallet">

  <div class="card" id="card">

    <div class="stage">

      <div class="inner" id="inner">

        <div class="face front">

          <div class="stars"></div>

          <div class="content">
            <div class="top">
              <img src="logo.png" class="logo">
              <span class="emboss" id="cardType">BLACK</span>
            </div>

            <div class="number emboss" id="cardNumber">
              C4RI JR06 00AX 0000
            </div>

          </div>

        </div>

        <div class="face back">

          <div class="back-content">

            <div class="promo" id="promoText"></div>

            <div class="qr-box">
              <div class="qr-wrapper" id="qrWrapper">
                <canvas id="qr"></canvas>
              </div>
            </div>

            <div class="footer">
              <img src="logo.png" class="logo-small">

              <p class="legal">
                VIGENCIA AL 31 DE DICIEMBRE DE 2026. NO VÁLIDO CON OTRAS PROMOCIONES. VÁLIDO SOLO EN SUCURSAL. NO TRANSFERIBLE.
              </p>
            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
